name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      # Statyczne media: przed buildem dodaj pliki do public/ (np. npm run media:link z commitem LFS
      # w data/exam-all-modules-export.media) i usuń VITE_USE_REMOTE_MEDIA poniżej.
      - name: Install and build
        run: npm ci && npm run build
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          VITE_USE_REMOTE_MEDIA: 'true'

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
